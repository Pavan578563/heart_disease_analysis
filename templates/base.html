<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Heart Disease Analytics{% endblock %}</title>
<script src="https://cdn.plot.ly/plotly-2.29.1.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <div class="brand">❤ HeartInsight <span>Analytics</span></div>
  <nav>
    <a href="/">Home</a>
    <a href="/dashboard/clinician">Clinician</a>
    <a href="/dashboard/policy">Policy</a>
    <a href="/dashboard/personal">Personal</a>
    <a href="/story">Story</a>
  </nav>
  <button class="nav-toggle" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>

<main>
  {% block content %}{% endblock %}
</main>
<footer>
  Heart Disease Analytics Project · Data Visualization &amp; BI (Tableau-equivalent web build) · Demo data, not real patient records
