{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="dash-header">
  <h1>{{ title }}</h1>

</section>
{{ kpi | safe }}

  {% endfor %}
</section>
{% endblock %}
